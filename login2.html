<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Art Loom</title>
    <link rel="stylesheet" href="login2.css">
</head>
<body>
    <div id="slide">
        <img src="artloom-logo.png" alt="Art Loom Logo" style="width: 200px;">
        <h3 style="color: #002f34; text-align: center;">Login to your Account</h3>
    </div>

    <div id="input-container" style="text-align: center; margin-top: 20px;">
        <div class="inp">
            <input type="email" id="email" placeholder="Email Address" style="width: 80%; padding: 10px; margin-bottom: 10px;">
        </div>
        <div class="inp">
            <input type="password" id="password" placeholder="Password" style="width: 80%; padding: 10px; margin-bottom: 20px;">
        </div>

        <button id="login-btn-form" type="submit" style="width: 80%; padding: 10px; background-color: #002f34; color: white; border: none; cursor: pointer; border-radius: 4px;">
            Login
        </button>

        <p style="font-size: 13px; color: #555; margin-top: 20px;">
            New to Art Loom? <a href="Registeration.html">Register Here</a>
        </p>
    </div>

    <script src="login2.js"></script>
</body>
</html>
